# Serves the built Nuxt SPA and reverse-proxies the API/admin to the backend.
#
# TLS: either terminate it here (add a `listen 443 ssl;` server with your certs)
# or front this with an external TLS proxy (Caddy / Traefik / Cloudflare). When
# TLS is terminated upstream, that proxy should set `X-Forwarded-Proto: https`
# (honored below) and you should set `DJANGO_SECURE_SSL_REDIRECT=False`.

# Prefer an upstream-provided scheme, fall back to this server's scheme.
map $http_x_forwarded_proto $forwarded_proto {
    default $scheme;
    https   https;
}

server {
    listen 80;
    server_name _;
    client_max_body_size 5m;

    # Resolve the `backend` upstream at request time via Docker's embedded DNS,
    # instead of caching its IP once at startup. Otherwise a redeploy that
    # recreates the backend container (new IP) leaves nginx pointing at the dead
    # address → 502 until the frontend is restarted. `$upstream` in proxy_pass is
    # what forces the runtime lookup.
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $upstream backend;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $forwarded_proto;

    # Backend: API, Django admin, and the admin's collected static.
    location /api/ {
        proxy_pass http://$upstream:8000;
    }
    location /admin/ {
        proxy_pass http://$upstream:8000;
    }
    location /django-static/ {
        proxy_pass http://$upstream:8000;
    }

    # Frontend SPA (hash-mode router → unknown paths fall back to index.html).
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
